<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzień Kobiet 2026 - Moc Życzeń</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --bg-soft: #fff5f7;
            --text-dark: #4a4a4a;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* Dekoracyjne elementy tła */
        .flower-bg {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            user-select: none;
            z-index: 1;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(25deg); }
        }

        /* Główna karta */
        .card {
            background: var(--white);
            width: 90%;
            max-width: 450px;
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 8px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        .icon-wrapper {
            background: var(--bg-soft);
            width: 80px;
            height: 80px;
            line-height: 85px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
        }

        .heart-icon {
            color: var(--primary-pink);
            font-size: 2.5rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary-pink);
        }

        .date-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b1b1b1;
            margin-bottom: 2rem;
            display: block;
        }

        .message {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            color: #555;
        }

        /* Przyciski i akcje */
        .btn {
            background: linear-gradient(to right, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 117, 140, 0.4);
            filter: brightness(1.1);
        }

        .surprise-text {
            display: none;
            margin-top: 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--secondary-pink);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="flower-bg" style="top: 10%; left: 5%;">🌸</div>
    <div class="flower-bg" style="top: 20%; right: 10%; animation-delay: 1s;">🌷</div>
    <div class="flower-bg" style="bottom: 15%; left: 15%; animation-delay: 2s;">🌺</div>
    <div class="flower-bg" style="bottom: 10%; right: 5%; animation-delay: 3s;">🌼</div>

    <div class="card">
        <div class="icon-wrapper">
            <i class="fas fa-heart heart-icon"></i>
        </div>
        
        <span class="date-label">8 Marca</span>
        <h1>Dla Wyjątkowej Kobiety</h1>
        
        <p class="message" id="wish-text">
            Przyjmij najserdeczniejsze życzenia: nieskończonych pokładów energii, 
            uśmiechu każdego dnia oraz odwagi, by zawsze podążać za głosem serca.
        </p>

        <button class="btn" id="action-btn" onclick="celebrate()">Otwórz Życzenia</button>
        
        <div id="surprise" class="surprise-text">
            Jesteś niesamowita! ✨🌷
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        function celebrate() {
            const btn = document.getElementById('action-btn');
            const surprise = document.getElementById('surprise');
            const wishText = document.getElementById('wish-text');

            // Zmiana tekstu i pokazanie niespodzianki
            btn.style.display = 'none';
            surprise.style.display = 'block';
            wishText.innerHTML = "Niech ten dzień będzie tak wspaniały, jak Ty sama. Pamiętaj, że świat jest piękniejszy dzięki Tobie!";

            // Efekt spadających serduszek
            createParticles();
        }

        function createParticles() {
            const count = 30;
            const colors = ['#ff758c', '#ff7eb3', '#ffafbd', '#ffffff'];

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'heart-particle';
                particle.innerHTML = '❤️';
                
                // Losowanie pozycji startowej i parametrów
                const startX = Math.random() * window.innerWidth;
                const size = Math.random() * 20 + 10;
                const duration = Math.random() * 3 + 2;

                particle.style.left = startX + 'px';
                particle.style.top = '-20px';
                particle.style.fontSize = size + 'px';
                particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
                
                document.body.appendChild(particle);

                // Animacja opadania
                setTimeout(() => {
                    particle.style.transform = `translateY(${window.innerHeight + 50}px) rotate(${Math.random() * 360}deg)`;
                    particle.style.opacity = '0';
                }, 50);

                // Usunięcie elementu po animacji
                setTimeout(() => {
                    particle.remove();
                }, duration * 1000);
            }
        }
    </script>
</body>
</html>
